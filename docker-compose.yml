version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
    environment:
      - CONFIG_PATH=/app/config/config.toml
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: docker/Dockerfile.cli
    volumes:
      - ./config:/app/config
    profiles:
      - cli
